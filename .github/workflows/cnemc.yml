name: CNEMC_Realtime_Update

on:
  workflow_dispatch:      # 允许手动补跑
  # schedule:
    # - cron: '50 * * * *'  
permissions:
  contents: write
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Show current time
      run: date
    - name: Inspect runner system
      run: |
        echo "===== OS ====="
        # uname -a
        lsb_release -a || cat /etc/os-release
        echo "===== CPU ====="
        lscpu | grep "Model name" && lscpu | grep "^CPU(s)"
        echo "===== Memory ====="
        free -h
        echo "===== Disk ====="
        df -h
        # echo "===== Disk details ====="
        # lsblk
        echo "===== Current user ====="
        whoami
        echo "===== Working directory ====="
        pwd
        echo "===== Files ====="
        ls -lh
        echo "===== Download speed test (curl) ====="
        curl -L -o /dev/null https://github.com/git/git/archive/refs/tags/v2.44.0.tar.gz
    - name: Install dependencies
      run: |
        pip install requests numpy pandas
    - name: Run Python
      run: |
        python src/EMC/cnemc_api.py

    - name: Clean historical data (older than 12 months)
      run: |
        set -e
        echo "=== Cleaning historical data older than 12 months ==="
        
        # 历史仓库基础 URL
        HIST_REPO="https://raw.githubusercontent.com/StorywithLove/Historical_Data_Archive/main/Archive"
        # 计算阈值日期（12 个月前最后一天）
        THRESHOLD_DATE=$(date -d "$(date +%Y-%m-01) -12 months" +%Y-%m-01)
        echo "Threshold date: $THRESHOLD_DATE (folders before this may be deleted if exist in hist repo)"

        # =========================
        # 1. 清理 CNEMC / ZJEMC 日期文件夹
        # =========================
        for SRC in CNEMC ZJEMC; do
          echo "--- Processing $SRC ---"
          SRC_DIR="Archive/$SRC"
          # 检查源目录是否存在
          [ -d "$SRC_DIR" ] || continue

          for folder in "$SRC_DIR"/*; do
            [ -d "$folder" ] || continue
            DATE_FOLDER=$(basename "$folder")
            # 判断是否小于阈值日期
            if [[ "$DATE_FOLDER" < "$THRESHOLD_DATE" ]]; then
              # 检查历史仓库是否存在对应文件夹
              HIST_URL="$HIST_REPO/$SRC/$DATE_FOLDER"
              if curl --head --silent --fail "$HIST_URL/" >/dev/null; then
                echo "Deleting $folder (exists in historical repo)"
                rm -rf "$folder"
              else
                echo "Keep $folder (not found in historical repo)"
              fi
            fi
          done
        done
        
        # =========================
        # 2. 清理 PVPower 单文件
        # =========================
        echo "--- Processing file archive: PVPower ---"
    
        PV_DIR="Archive/PVPower"
    
        if [ -d "$PV_DIR" ]; then
          for file in "$PV_DIR"/HZ_*.csv; do
            [ -f "$file" ] || continue
    
            FILE_NAME=$(basename "$file")
    
            # 匹配 HZ_YYYY-MM-DD.csv
            if [[ "$FILE_NAME" =~ ^HZ_([0-9]{4}-[0-9]{2}-[0-9]{2})\.csv$ ]]; then
              DATE_FILE="${BASH_REMATCH[1]}"
    
              if [[ "$DATE_FILE" < "$THRESHOLD_DATE" ]]; then
                HIST_FILE_URL="$HIST_REPO/PVPower/$FILE_NAME"
    
                if curl --head --silent --fail "$HIST_FILE_URL" >/dev/null; then
                  echo "Deleting $file (found in historical repo: $FILE_NAME)"
                  rm -f "$file"
                else
                  echo "Keep $file (not found in historical repo: $FILE_NAME)"
                fi
              fi
            else
              echo "Skip unmatched PVPower file: $FILE_NAME"
            fi
          done
        else
          echo "PVPower directory not found: $PV_DIR"
        fi
    - name: Commit changes if any
      run: |
        git config --global user.email "BOT@github.com"
        git config --global user.name "githubBOT"
        git add .
        git diff --cached --quiet || git commit -m "update realtime CNEMC" -a
        # git commit -m "update realtime CNEMC" -a
    - name: Who am I (git)
      run: |
        git remote -v
        git config --get user.name
        git config --get user.email
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{secrets.GTOKEN}}
