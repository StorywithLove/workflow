name: HZ_PVPower_Playwright_Update

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date, YYYY-MM-DD. Leave empty to run today."
        required: false
        type: string
      end_date:
        description: "End date, YYYY-MM-DD. Leave empty to run only start_date/today."
        required: false
        type: string
  schedule:
    - cron: "10 23 * * *"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GLC_USR: ${{ secrets.GLC_USR }}
      GLC_PWD: ${{ secrets.GLC_PWD }}
      START_DATE: ${{ github.event.inputs.start_date || '' }}
      END_DATE: ${{ github.event.inputs.end_date || '' }}

    steps:
      # 1. 拉代码
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. 缓存 Python 包和 Playwright 浏览器
      - name: Cache Python & Playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pvpower-playwright-pip-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pvpower-playwright-pip-

      # 4. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas requests xlrd
          playwright install chromium

      # 5. 运行爬虫
      - name: Run crawler
        shell: bash
        run: |
          if [[ -n "$START_DATE" && -n "$END_DATE" ]]; then
            python src/Energy/api_PVPower_HZ.py "$START_DATE" "$END_DATE"
          elif [[ -n "$START_DATE" ]]; then
            python src/Energy/api_PVPower_HZ.py "$START_DATE"
          else
            python src/Energy/api_PVPower_HZ.py
          fi

      # 6. 提交变更
      - name: Commit changes if any
        run: |
          git config --global user.email "BOT@github.com"
          git config --global user.name "githubBOT"
          git add data/
          git diff --cached --quiet || git commit -m "update realtime HZ PV power"

      # 7. git 状态检查
      - name: Who am I (git)
        run: |
          git remote -v
          git config --get user.name
          git config --get user.email

      # 8. 推送
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GTOKEN }}
