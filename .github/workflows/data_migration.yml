name: Data_Migration_Archive_to_Structured

on:
  workflow_dispatch:   # 手动触发（非常重要）
  # 可以未来加 schedule 做周期整理
permissions:
  contents: write
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Show environment
      run: |
        echo "=== Start Migration ==="
        ls -lh
    # =========================
    # 核心迁移逻辑
    # =========================
    - name: Migrate Archive → CNEMC
      run: |
        mkdir -p Archive/CNEMC
        # 防止没有文件时报错
        shopt -s nullglob
        for file in Archive/*.csv; do
          echo "Moving $file"
          mv "$file" Archive/CNEMC/
        done
    - name: Migrate Archive → ZJEMC (if needed)
      run: |
        mkdir -p Archive/ZJEMC
        shopt -s nullglob
        # 如果未来你有规则区分，这里可以扩展
        # 当前示例：空逻辑占位
        for file in Archive/ZJEMC_source/*.csv; do
          mv "$file" Archive/ZJEMC/
        done

    # =========================
    # 提交变更
    # =========================
    - name: Commit migration results
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add Archive/

        git diff --cached --quiet && echo "No migration needed" && exit 0

        git commit -m "data migration: restructure Archive → CNEMC/ZJEMC"

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GTOKEN }}
